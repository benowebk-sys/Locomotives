<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locomotives & Other Rolling Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-gray: #f3f4f6;
            --mid-gray: #9ca3af;
            --dark-gray: #1f2937;
            --black-accent: #000000;
            --accent-color: #3b82f6; 
            --success-color: #00f2ff; /* Cyan Neon */
            --error-color: #ff003c;   /* Red Neon */
            --bebo-purple: #9d00ff;   /* Purple Neon */
        }

        body {
            background: #020205;
            color: var(--light-gray);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Responsive Header */
        .header-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            color: var(--light-gray);
            letter-spacing: 2px;
            font-size: 1.1rem;
        }
        @media (min-width: 768px) {
            .header-title { letter-spacing: 4px; font-size: 2.2rem; }
        }

        .header-border {
            height: 2px;
            background: var(--accent-color);
            width: 100%;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Card Container */
        .question-card {
            background: #0d0d12;
            border: 1px solid #1a1a24;
            border-left: 4px solid var(--accent-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
        }
        @media (min-width: 768px) {
            .question-card { border-left-width: 6px; }
        }

        /* --- Bebo Robot (Solid 3D) --- */
        .bebo-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: -15px;
            z-index: 50;
            pointer-events: none;
        }

        .bebo-bubble {
            background: #12121a;
            border: 1px solid #222230;
            padding: 10px 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 12px;
            max-width: 260px;
            margin-bottom: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            direction: rtl;
            pointer-events: auto;
            text-align: center;
        }
        @media (min-width: 768px) {
            .bebo-bubble { font-size: 14px; max-width: 320px; padding: 12px 20px; }
        }

        .bebo-bubble.active { opacity: 1; transform: scale(1); }

        .bebo-robot {
            width: 75px;
            height: 75px;
            background: #0d0d12; 
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.05), 0 15px 30px rgba(0,0,0,0.7);
            cursor: pointer;
            border: 1px solid #1a1a24;
            animation: beboFloat 4s ease-in-out infinite;
            pointer-events: auto;
        }
        @media (min-width: 768px) {
            .bebo-robot { width: 95px; height: 95px; border-radius: 28px; }
        }

        @keyframes beboFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .flash-active .eye { animation: eyeFlash 0.5s ease-out; }
        @keyframes eyeFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(3) blur(2px); transform: scale(1.1); }
            100% { filter: brightness(1); }
        }

        .eyes-container { display: flex; gap: 10px; }
        @media (min-width: 768px) { .eyes-container { gap: 14px; } }

        .eye {
            width: 10px; height: 16px;
            background: var(--bebo-purple);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--bebo-purple), 0 0 20px var(--bebo-purple);
            transition: all 0.3s ease;
        }
        @media (min-width: 768px) { .eye { width: 12px; height: 18px; } }

        /* SUCCESS: Happy Eyes */
        .bebo-robot.success .eye {
            background: var(--success-color);
            box-shadow: 0 0 15px var(--success-color), 0 0 30px var(--success-color);
            height: 7px; width: 16px; border-radius: 20px 20px 0 0; margin-top: 5px;
        }

        /* READY: Cyan Eyes */
        .bebo-robot.ready .eye {
            background: var(--success-color);
            box-shadow: 0 0 15px var(--success-color), 0 0 30px var(--success-color);
        }

        /* ERROR: Slanted Angry Eyes */
        .bebo-robot.error .eye {
            background: var(--error-color);
            box-shadow: 0 0 15px var(--error-color), 0 0 30px var(--error-color);
            height: 5px; width: 18px; border-radius: 2px; transform: rotate(-15deg);
        }
        .bebo-robot.error .eye:last-child { transform: rotate(15deg); }

        /* UI Elements */
        .option-btn {
            background: transparent;
            border: 1px solid #222;
            color: var(--mid-gray);
            transition: all 0.2s ease;
            font-family: 'Oswald', sans-serif;
            text-align: left;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            width: 100%;
        }
        @media (min-width: 768px) {
            .option-btn { padding: 1.1rem 1.5rem; font-size: 1rem; }
        }

        .option-btn:hover:not(.locked) {
            border-color: var(--accent-color);
            color: #ffffff;
            background: rgba(59, 130, 246, 0.03);
        }

        .option-btn.correct { border-color: var(--success-color) !important; color: var(--success-color) !important; background: rgba(0, 242, 255, 0.05) !important; }
        .option-btn.wrong { border-color: var(--error-color) !important; color: var(--error-color) !important; background: rgba(255, 0, 60, 0.05) !important; }
        .option-btn.locked { cursor: default; }

        .nav-btn { background: #0d0d12; border: 1px solid #1a1a24; color: var(--mid-gray); transition: all 0.2s; font-size: 0.75rem; }
        @media (min-width: 768px) { .nav-btn { font-size: 0.9rem; } }
        .nav-btn:hover:not(:disabled) { border-color: var(--accent-color); color: #fff; }
        .nav-btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .hint-container { background: rgba(255, 255, 255, 0.02); border-bottom: 1px solid #1a1a24; cursor: pointer; }
        .bulb-icon { width: 18px; height: 18px; fill: #333; transition: all 0.4s ease; }
        @media (min-width: 768px) { .bulb-icon { width: 24px; height: 24px; } }
        .bulb-active { fill: var(--accent-color); filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.8)); }

        #progress-bar { height: 3px; background: #000; width: 100%; position: fixed; top: 0; left: 0; z-index: 1000; }
        #progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.5s ease; }

        #result-message {
            font-size: 1rem;
            line-height: 1.5;
            max-width: 500px;
            margin: 0 auto;
            direction: rtl;
        }
        @media (min-width: 768px) { #result-message { font-size: 1.2rem; } }

        .final-score-val { font-size: 4rem; }
        @media (min-width: 768px) { .final-score-val { font-size: 7.5rem; } }
    </style>
</head>
<body>

    <div id="progress-bar"><div id="progress-fill"></div></div>

    <header class="bg-black py-5 md:py-10 text-center relative z-10">
        <h1 class="header-title font-bold px-4">Locomotives & Other Rolling Stock</h1>
        <div class="header-border absolute bottom-0 left-0"></div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-6 md:py-12 flex flex-col items-center justify-center relative z-10">
        
        <!-- Bebo Robot -->
        <div class="bebo-wrapper">
            <div id="bebo-bubble" class="bebo-bubble">يا هلا يا هلا</div>
            <div id="bebo-robot" class="bebo-robot" onclick="triggerBeboFlash()">
                <div class="eyes-container">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-container" class="w-full max-w-2xl lg:max-w-3xl">
            <div id="question-card" class="question-card rounded-sm overflow-hidden mb-6">
                <div class="hint-container px-4 py-3 md:px-6 md:py-4 flex items-center justify-between" onclick="toggleHint()">
                    <div class="text-[9px] md:text-[12px] tracking-[0.2em] md:tracking-[0.3em] text-zinc-600 font-bold uppercase">
                        HINT SERVICE: <span id="hint-text" class="hidden ml-2 italic text-zinc-200">...</span>
                    </div>
                    <div id="bulb-wrapper">
                        <svg class="bulb-icon" viewBox="0 0 24 24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 0 1 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.06-2.15 4.1zM9 19h6c.55 0 1 .45 1 1s-.45 1-1 1H9c-.55 0-1-.45-1-1s.45-1 1-1z"/>
                        </svg>
                    </div>
                </div>

                <div class="p-6 md:p-12">
                    <p id="question-number" class="text-zinc-500 font-bold mb-4 uppercase tracking-[0.2em] text-[9px] md:text-xs">ASSESSMENT POINT 01 OF 30</p>
                    <h2 id="question-text" class="text-base md:text-2xl font-medium leading-relaxed mb-8 md:mb-12 text-zinc-300">Initializing...</h2>
                    <div id="options-container" class="grid grid-cols-1 gap-3 md:gap-4"></div>
                </div>
            </div>

            <div class="flex flex-wrap justify-between gap-3">
                <button id="back-btn" onclick="prevQuestion()" class="nav-btn px-6 py-2 md:px-10 md:py-3 rounded-sm font-bold uppercase flex-1 md:flex-none">Back</button>
                <div class="flex gap-3 flex-1 md:flex-none">
                    <button id="skip-btn" onclick="nextQuestion()" class="nav-btn px-6 py-2 md:px-10 md:py-3 rounded-sm font-bold uppercase flex-1">Skip</button>
                    <button id="next-btn" onclick="nextQuestion()" class="nav-btn px-6 py-2 md:px-10 md:py-3 rounded-sm font-bold uppercase flex-1">Next</button>
                </div>
            </div>
        </div>

        <div id="result-view" class="hidden w-full max-w-xl text-center bg-zinc-950 p-8 md:p-16 rounded-sm border border-zinc-900">
            <h2 class="text-xl md:text-2xl font-bold mb-4 text-zinc-500 uppercase tracking-widest">Assessment Finalized</h2>
            <div class="final-score-val font-black text-white mb-2" id="final-score">0%</div>
            <p id="result-message" class="text-zinc-400 mb-10 font-medium"></p>
            <button onclick="restartQuiz()" class="border border-zinc-500 text-zinc-300 px-10 py-3 md:py-4 rounded-sm text-xs font-bold uppercase hover:bg-white hover:text-black transition-all">Restart Sequence</button>
        </div>
    </main>

    <footer class="bg-black py-8 border-t border-zinc-900 z-10">
        <div class="container mx-auto px-4 text-center">
            <p class="text-zinc-600 font-bold tracking-[0.3em] uppercase text-[9px] md:text-xs">Programmer Bilal Muhammad</p>
        </div>
    </footer>

    <script>
        const quizData = [
            { q: "What is the typical acceleration value during the constant acceleration period for mainline service?", options: ["1.5 to 4 km/h/s", "0.5 to 1 km/h/s", "3 to 5 km/h/s", "0.15 km/h/s"], a: 1, hint: "Mainline acceleration is lower due to long haulage." },
            { q: "In suburban service, the distance between two adjacent stops for an electric train typically lies between:", options: ["10 and 20 km", "1 and 8 km", "Less than 1 km", "50 and 60 km"], a: 1, hint: "Commuter routes average 1-8km per station." },
            { q: "Which of the following periods is absent in the speed-time curve for urban service?", options: ["Coasting", "Braking", "Free-running", "Acceleration"], a: 2, hint: "City stops are too close for free-running." },
            { q: "How is 'Schedule Time' defined in railway operations?", options: ["Run time - Stop time", "Run time / Stop time", "Run time + Stop time", "Run time × Stop time"], a: 2, hint: "It accounts for the total transit duration." },
            { q: "If the distance between stops increases, how does it affect the schedule speed?", options: ["It decreases the speed", "It has no effect", "The schedule speed will be higher", "The speed becomes zero"], a: 2, hint: "Longer stretches allow for higher average speeds." },
            { q: "For electric locomotives, how often is a Periodical Overhaul (POH) typically performed?", options: ["Every 6 years", "Every 15 days", "Every 18 years", "Every 6 months"], a: 2, hint: "Electric units have long overhaul cycles (18yr)." },
            { q: "Which key maintenance activity involves testing traction motors, alternators, and transformers?", options: ["Undergear maintenance", "Electrical maintenance", "Mechanical maintenance", "Safety devices maintenance"], a: 1, hint: "Motors and transformers are core power components." },
            { q: "What type of maintenance involves regular, planned interventions to keep vehicles in optimal condition?", options: ["Reactive Maintenance", "Corrective Maintenance", "Preventive Maintenance", "Predictive Maintenance"], a: 2, hint: "Plan before failure = Preventive." },
            { q: "What device is used to reprofile railway wheels without disassembling them from the vehicle?", options: ["Laser scanning system", "Ground diagnostic portal", "Under-floor wheel lathe", "Remote diagnostics system"], a: 2, hint: "It stays in the pit (under-floor)." },
            { q: "What is the etymological origin of the word 'locomotive'?", options: ["Greek origin", "Latin 'loco' and 'motivus'", "French origin", "German origin"], a: 1, hint: "Latin for 'from a place' and 'causing motion'." },
            { q: "Why do heavy trains sometimes utilize two locomotives?", options: ["To decrease speed", "To replace braking systems", "For additional motive power", "For interior lighting only"], a: 2, hint: "Two engines = double the traction power." },
            { q: "What is the approximate efficiency of a non-condensing steam locomotive drive?", options: ["25%", "6 to 8%", "50%", "90%"], a: 1, hint: "Steam engines have very low efficiency (6-8%)." },
            { q: "Which of the following is a disadvantage of a diesel-electric drive system?", options: ["High running and maintenance costs", "Inability to carry passengers", "Requires massive track modification", "High power loss in cables"], a: 0, hint: "Maintenance costs." },
            { q: "Which traction system is considered the cleanest for the local environment?", options: ["Steam Drive", "Diesel Drive", "Electric Drive", "Petrol-Electric"], a: 2, hint: "Electric produces zero local emissions." },
            { q: "How are battery vehicles grouped for starting and running up to half-speed?", options: ["In series", "In parallel", "In tandem", "Alternating"], a: 1, hint: "Parallel grouping for lower starting voltage." },
            { q: "A locomotive is defined as a series of connected carriages that run along a railway track.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "Steam locomotives are currently the most widely used locomotives outside of heritage trains.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "The speed-time curve for main line service consists of 5 standard periods.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Urban service curves usually contain a prominent free-running period.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "Coasting retardation is usually denoted by the Greek symbol 'β'.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Schedule speed calculation excludes the time spent at station stops.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "For a diesel locomotive, a POH is typically performed every 6 years or 0.8 million km.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Reactive maintenance is defined as the regular upkeep of equipment while it is still functional.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "Wheel reprofiling restores the original profile to ensure optimal rail adhesion.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Direct internal combustion engine drives have an efficiency of about 25% at normal speed.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Steam electric drives are widely used today due to their lack of mechanical complications.", options: ["True", "False"], a: 1, hint: "False" },
            { q: "Diesel-electric drives require no modification of existing track during conversion from steam.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Battery electric drives are well suited for local delivery within a 50-60 km daily range.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "The electric drive is significantly cleaner than all other types of traction systems.", options: ["True", "False"], a: 0, hint: "True" },
            { q: "Failure of the power supply for a few minutes will not impact an electric traction system.", options: ["True", "False"], a: 1, hint: "False" }
        ];

        let idx = 0, score = 0, mistakes = 0, lastTime = Date.now();
        let userAns = new Array(quizData.length).fill(null);

        // المصفوفة الجديدة المطلوبة بالكامل
        const beboMessages = {
            intro: ["يا هلا يا هلا ", "مرحبا اسمي بيبو جاهز لبدا الاختبار ؟.", "نجم النجوم حمدلله على السلامه يعم ."],
            correct: ["يسلام عليك وانت ملعلع كده ايوا استمر عاش.", "ايوا كده عاوزك تقفل الورقه فى الامتحان.", "هايل يباشا الله عليك عاش.", "يسلام عيك عليك انت كده تلعب على الامتياز يانجم .", "شكلك مذاكر المنهج مرتين  .","لسانى يعجز عن الكلام والله بس حقيقى برافو .","الدكتور مبسوطه منك هايل والله .","شخصين بحبهم انت والمصمم عاش عليك بجد يسطا ."],
            aggressive: ["تقريبا الفص الى فى مخك المسؤل عن اتخاذ القرارات فص ثوم.", "تعرف لو جابو ليا كنوز الدنيا علشان ابيعك هبيعك اى الى انت بتعملو ده.", "انت بتنام يسطا ولا متفوق يعم انت بتغرق كده.", "ادائك ده يدرس حقيقى اى الضحك ده يسطا.", "شوف التلميحات.","حسب خبرتى كده انت تلعب بالعجله درجن درجن الامتياز ده مش سكتك صدقنى.","الموكوس وخايب الرجا لما يقعدو مع بعض .","جلنف جلنف يعنى مفيش كلام.","ركز  .","عارف الحيا هتحلو امتى لما تذاكر ."],
            resultsAdvice: [
                "نتيجتك دى يسطا ولا درجه حراره.",
                "منت لو تبص على التلميحات وانت بتحل مكنتش جبت درجات الحراره دى.",
                "تعي اشب شاى يسطا بالى انت عامله ده.",
                "متزعلش مش مهم درجتك فى الامتحان المهم الصحه والستر.",
                "هيجى شخص يحسسك انك ف كفه والكون كله فى كفه وبعدين يسقفلك بالكفتين على وشك علىشان النتيجه الى انت جايبها دى."
            ],
            resultsSuccess: [
                "مشاء الله عليك ",
                "هايل بجد عاش عليك.",
                "شيئ جميل جدا متنساش تراجع الاساله النظرى  ."
            ]
        };

        function setBebo(state, category) {
            const robot = document.getElementById('bebo-robot');
            const bubble = document.getElementById('bebo-bubble');
            const msgs = beboMessages[category];
            
            robot.className = `bebo-robot ${state}`;
            
            if (msgs && msgs.length > 0) {
                bubble.innerText = msgs[Math.floor(Math.random() * msgs.length)];
                bubble.classList.add('active');
            } else {
                bubble.classList.remove('active');
            }

            // إخفاء الفقاعة بعد وقت معين
            setTimeout(() => { 
                bubble.classList.remove('active');
                if(idx < quizData.length) robot.classList.remove('success', 'error');
            }, 4500);
        }

        function triggerBeboFlash() {
            const robot = document.getElementById('bebo-robot');
            robot.classList.add('flash-active');
            setTimeout(() => robot.classList.remove('flash-active'), 500);
        }

        function toggleHint() {
            document.getElementById('hint-text').classList.toggle('hidden');
            document.querySelector('.bulb-icon').classList.toggle('bulb-active');
        }

        function render() {
            const q = quizData[idx];
            document.getElementById('question-number').innerText = `ASSESSMENT POINT ${idx + 1} OF ${quizData.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('hint-text').innerText = q.hint;
            document.getElementById('hint-text').classList.add('hidden');
            document.querySelector('.bulb-icon').classList.remove('bulb-active');
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const answered = userAns[idx] !== null;
            document.getElementById('next-btn').disabled = !answered;

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn rounded-sm flex items-center gap-3 md:gap-4 w-full';
                btn.innerHTML = `<span class="bg-white/5 w-6 h-6 md:w-8 md:h-8 rounded-lg flex items-center justify-center font-bold text-[10px] md:text-xs">${String.fromCharCode(65 + i)}</span> <span>${opt}</span>`;
                
                if (answered) {
                    btn.classList.add('locked');
                    if (i === q.a) btn.classList.add('correct');
                    if (userAns[idx] === i && i !== q.a) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => select(i);
                }
                container.appendChild(btn);
            });
            
            document.getElementById('progress-fill').style.width = `${((idx + 1) / quizData.length) * 100}%`;
            lastTime = Date.now();
        }

        function select(choice) {
            if (userAns[idx] !== null) return;
            userAns[idx] = choice;
            const correct = (choice === quizData[idx].a);
            
            if (correct) {
                score++;
                mistakes = 0;
                setBebo('success', 'correct');
            } else {
                mistakes++;
                // تفعيل الرسائل الهجومية عند الخطأ
                setBebo('error', 'aggressive'); 
            }
            render();
        }

        function nextQuestion() { 
            if (idx < quizData.length - 1) { 
                idx++; 
                render(); 
            } else finish(); 
        }
        
        function prevQuestion() { 
            if (idx > 0) { 
                idx--; 
                render(); 
            } 
        }
        
        function finish() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.querySelector('.bebo-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / quizData.length) * 100);
            document.getElementById('final-score').innerText = pct + '%';
            
            const category = pct >= 80 ? 'resultsSuccess' : 'resultsAdvice';
            const msgs = beboMessages[category];
            const finalMsg = msgs[Math.floor(Math.random() * msgs.length)];
            document.getElementById('result-message').innerText = finalMsg;
        }

        function restartQuiz() {
            idx = 0; score = 0; mistakes = 0;
            userAns = new Array(quizData.length).fill(null);
            document.querySelector('.bebo-wrapper').classList.remove('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-view').classList.add('hidden');
            render();
            setBebo('ready', 'intro');
        }

        window.onload = () => { render(); setBebo('ready', 'intro'); };
    </script>
</body>
</html>
